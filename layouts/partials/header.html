<header role="banner">
  <div class="container header-inner">
    <a href="/" class="logo" aria-label="NeuroFamilies home">
      <span class="logo-icon" aria-hidden="true">🧠</span>
      <span class="logo-text">Neuro<strong>Families</strong></span>
    </a>
    
    <button class="mobile-menu-toggle" aria-label="Toggle navigation menu" aria-expanded="false">
      <span class="hamburger"></span>
    </button>
    
    <nav role="navigation" aria-label="Main navigation" class="main-nav">
      <ul>
        {{ range .Site.Menus.main }}
        <li>
          <a href="{{ .URL }}" {{ if eq $.RelPermalink .URL }}aria-current="page"{{ end }}>
            {{ .Name }}
          </a>
        </li>
        {{ end }}
      </ul>
    </nav>
  </div>
</header>
